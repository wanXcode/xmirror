<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XMirror Moderation Admin</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;margin:0;background:#0f172a;color:#e2e8f0}
    .wrap{max-width:980px;margin:0 auto;padding:24px}
    .card{background:#111827;border:1px solid #334155;border-radius:16px;padding:20px;margin-bottom:16px}
    h1,h2{margin:0 0 12px}
    .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    input,button,select{border-radius:10px;border:1px solid #475569;padding:10px 12px;font-size:14px}
    input{background:#0b1220;color:#fff;min-width:280px}
    button{background:#2563eb;color:#fff;cursor:pointer}
    button.secondary{background:#334155}
    .status-on{color:#22c55e;font-weight:700}
    .status-off{color:#f59e0b;font-weight:700}
    .muted{color:#94a3b8;font-size:13px}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{border-top:1px solid #334155;padding:10px 8px;text-align:left;vertical-align:top}
    th{color:#cbd5e1}
    code{background:#0b1220;padding:2px 6px;border-radius:6px}
    .pill{display:inline-block;padding:2px 8px;border-radius:999px;background:#1e293b;margin-right:6px;margin-bottom:4px}
    .ok{color:#22c55e}.reject{color:#f87171}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Moderation Admin</h1>
      <div class="row">
        <input id="token" type="password" placeholder="输入 MODERATION_ADMIN_TOKEN" />
        <button onclick="saveTokenAndReload()">连接后台</button>
        <button class="secondary" onclick="refreshAll()">刷新</button>
      </div>
      <p class="muted">这是 xmirror 的简易审核后台。当前支持：开关新增审核、查看最近审核日志。</p>
      <div id="flash" class="muted"></div>
    </div>

    <div class="card">
      <h2>审核开关</h2>
      <div class="row">
        <div>当前状态：<span id="enabledState">-</span></div>
        <button onclick="toggleModeration(true)">开启审核</button>
        <button class="secondary" onclick="toggleModeration(false)">关闭审核</button>
      </div>
      <p id="updatedAt" class="muted"></p>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between">
        <h2>最近审核日志</h2>
        <select id="limit" onchange="loadLogs()">
          <option value="20">20</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
        </select>
      </div>
      <table>
        <thead>
          <tr><th>时间</th><th>动作</th><th>阶段</th><th>作者</th><th>URL</th><th>命中</th></tr>
        </thead>
        <tbody id="logsBody"></tbody>
      </table>
    </div>
  </div>
  <script>
    const tokenInput = document.getElementById('token');
    tokenInput.value = localStorage.getItem('xmirror_admin_token') || '';

    function getToken(){ return tokenInput.value.trim(); }
    function setFlash(msg, isError=false){ const el=document.getElementById('flash'); el.textContent=msg||''; el.style.color=isError?'#fca5a5':'#94a3b8'; }
    function authHeaders(){ return { 'Content-Type':'application/json', 'x-admin-token': getToken() }; }
    function saveTokenAndReload(){ localStorage.setItem('xmirror_admin_token', getToken()); refreshAll(); }
    async function api(url, options={}){
      const res = await fetch(url, { ...options, headers: { ...(options.headers||{}), ...authHeaders() } });
      const data = await res.json().catch(()=>({ error:'响应解析失败' }));
      if(!res.ok) throw new Error(data.error || '请求失败');
      return data;
    }
    async function loadSettings(){
      const data = await api('/api/admin/moderation/settings');
      const enabled = !!data.settings.enabled;
      document.getElementById('enabledState').textContent = enabled ? '开启' : '关闭';
      document.getElementById('enabledState').className = enabled ? 'status-on' : 'status-off';
      document.getElementById('updatedAt').textContent = '最近更新时间：' + (data.settings.updated_at || '-');
    }
    async function toggleModeration(enabled){
      try {
        await api('/api/admin/moderation/settings', { method:'POST', body: JSON.stringify({ enabled }) });
        setFlash('审核开关已更新');
        await loadSettings();
      } catch (e) { setFlash(e.message, true); }
    }
    function renderMatched(matched=[]){
      if(!matched.length) return '<span class="muted">-</span>';
      return matched.map(item => `<span class="pill">${item.type}: ${item.value || item.label || ''}${item.score?` (+${item.score})`:''}</span>`).join('');
    }
    async function loadLogs(){
      try {
        const limit = document.getElementById('limit').value;
        const data = await api('/api/admin/moderation/logs?limit=' + encodeURIComponent(limit));
        const rows = (data.logs || []).map(log => `
          <tr>
            <td>${log.ts || '-'}</td>
            <td class="${log.action === 'reject' ? 'reject' : 'ok'}">${log.action || '-'}</td>
            <td>${log.stage || '-'}</td>
            <td><code>${log.authorHandle || log.handle || '-'}</code></td>
            <td style="word-break:break-all">${log.url || '-'}</td>
            <td>${renderMatched(log.matched || [])}</td>
          </tr>
        `).join('');
        document.getElementById('logsBody').innerHTML = rows || '<tr><td colspan="6" class="muted">暂无日志</td></tr>';
      } catch (e) { setFlash(e.message, true); }
    }
    async function refreshAll(){
      localStorage.setItem('xmirror_admin_token', getToken());
      try {
        await loadSettings();
        await loadLogs();
        setFlash('后台已连接');
      } catch (e) { setFlash(e.message, true); }
    }
    refreshAll();
  </script>
</body>
</html>
