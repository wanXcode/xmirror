<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XMirror - Dashboard Edition</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .dashboard {
      background: #1e293b;
      border-radius: 16px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      border: 1px solid #334155;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid #334155;
    }
    
    .logo-section {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    
    .logo-text h1 {
      font-size: 24px;
      font-weight: 700;
      color: #f8fafc;
    }
    
    .logo-text p {
      font-size: 12px;
      color: #64748b;
    }
    
    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(34, 197, 94, 0.1);
      border-radius: 20px;
      font-size: 12px;
      color: #22c55e;
    }
    
    .status-dot {
      width: 6px;
      height: 6px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 4px;
    }
    
    .stat-label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .input-section {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .input-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .input-dashboard {
      width: 100%;
      padding: 14px 16px;
      background: #1e293b;
      border: 1px solid #475569;
      border-radius: 8px;
      color: #f8fafc;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }
    
    .input-dashboard:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    
    .input-dashboard::placeholder {
      color: #64748b;
    }
    
    .btn-dashboard {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .btn-dashboard:hover {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      transform: translateY(-1px);
      box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
    }
    
    .recent-activity {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #334155;
    }
    
    .section-title {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    
    .activity-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: #0f172a;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    
    .activity-icon {
      width: 32px;
      height: 32px;
      background: rgba(59, 130, 246, 0.1);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    
    .activity-info {
      flex: 1;
    }
    
    .activity-title {
      font-size: 13px;
      color: #f8fafc;
      margin-bottom: 2px;
    }
    
    .activity-time {
      font-size: 11px;
      color: #64748b;
    }
    
    .back-link {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #64748b;
      text-decoration: none;
      font-size: 13px;
      padding: 8px 16px;
      background: #1e293b;
      border-radius: 6px;
      border: 1px solid #334155;
      transition: all 0.2s;
    }
    
    .back-link:hover {
      color: #f8fafc;
      border-color: #475569;
    }
  </style>
</head>
<body>
  <a href="../" class="back-link">← Back to Gallery</a>
  
  <div class="dashboard">
    <div class="header">
      <div class="logo-section">
        <div class="logo-icon">🐦</div>
        <div class="logo-text">
          <h1>XMirror</h1>
          <p>Archive Dashboard</p>
        </div>
      </div>
      <div class="status-badge">
        <div class="status-dot"></div>
        Online
      </div>
    </div>
    
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value">128</div>
        <div class="stat-label">Total Archives</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">1.2k</div>
        <div class="stat-label">Images Saved</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">48</div>
        <div class="stat-label">Videos</div>
      </div>
    </div>
    
    <div class="input-section">
      <div class="input-label">🔗 NEW ARCHIVE</div>
      <input type="text" class="input-dashboard" placeholder="https://x.com/username/status/...">
    </div>
    
    <button class="btn-dashboard">Create Archive →</button>
    
    <div class="recent-activity">
      <div class="section-title">Recent Activity</div>
      <div class="activity-item">
        <div class="activity-icon">📄</div>
        <div class="activity-info">
          <div class="activity-title">New archive created</div>
          <div class="activity-time">2 minutes ago</div>
        </div>
      </div>
      <div class="activity-item">
        <div class="activity-icon">🖼️</div>
        <div class="activity-info">
          <div class="activity-title">12 images downloaded</div>
          <div class="activity-time">15 minutes ago</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
