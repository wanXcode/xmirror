<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XMirror - 选择界面风格</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    
    h1 {
      font-size: 48px;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #00f5ff, #ff00ff, #00f5ff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradient 3s ease infinite;
    }
    
    @keyframes gradient {
      0%, 100% { background-position: 0% center; }
      50% { background-position: 200% center; }
    }
    
    .subtitle {
      color: #888;
      margin-bottom: 60px;
      font-size: 18px;
    }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      max-width: 1200px;
      width: 100%;
    }
    
    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left 0.5s;
    }
    
    .card:hover::before {
      left: 100%;
    }
    
    .card:hover {
      transform: translateY(-10px);
      border-color: rgba(0, 245, 255, 0.5);
      box-shadow: 0 20px 40px rgba(0, 245, 255, 0.1);
    }
    
    .card-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    
    .card h2 {
      font-size: 24px;
      margin-bottom: 10px;
      color: #fff;
    }
    
    .card p {
      color: #888;
      font-size: 14px;
      line-height: 1.6;
    }
    
    .tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      margin-top: 15px;
      font-weight: 500;
    }
    
    .tag.cyber { background: linear-gradient(90deg, #ff006e, #8338ec); }
    .tag.glass { background: linear-gradient(90deg, #00f5ff, #0066ff); }
    .tag.future { background: linear-gradient(90deg, #ffbe0b, #fb5607); }
    .tag.dark { background: linear-gradient(90deg, #8b5cf6, #ec4899); }
    .tag.dashboard { background: linear-gradient(90deg, #10b981, #3b82f6); }
  </style>
</head>
<body>
  <h1>🚀 XMirror UI 设计</h1>
  <p class="subtitle">选择你喜欢的科技感界面风格</p>
  
  <div class="grid">
    <a href="1/" class="card">
      <div class="card-icon">⚡</div>
      <h2>赛博朋克</h2>
      <p>霓虹灯效、故障艺术、未来都市风格</p>
      <span class="tag cyber">CYBERPUNK</span>
    </a>
    
    <a href="2/" class="card">
      <div class="card-icon">💎</div>
      <h2>玻璃拟态</h2>
      <p>透明毛玻璃、极光渐变、极简优雅</p>
      <span class="tag glass">GLASSMORPHISM</span>
    </a>
    
    <a href="3/" class="card">
      <div class="card-icon">🌌</div>
      <h2>未来主义</h2>
      <p>3D悬浮、空间感、星际探索风格</p>
      <span class="tag future">FUTURISTIC</span>
    </a>
    
    <a href="4/" class="card">
      <div class="card-icon">🎮</div>
      <h2>暗黑科技</h2>
      <p>深黑主题、霓虹光效、游戏风格</p>
      <span class="tag dark">DARK TECH</span>
    </a>
    
    <a href="5/" class="card">
      <div class="card-icon">📊</div>
      <h2>数据仪表盘</h2>
      <p>数据可视化、HUD界面、专业分析风格</p>
      <span class="tag dashboard">DASHBOARD</span>
    </a>
  </div>
</body>
</html>
