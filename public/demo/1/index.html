<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XMirror - Cyberpunk Edition</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Orbitron', monospace;
      background: #0a0a0f;
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
      position: relative;
    }
    
    /* 动态网格背景 */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      perspective: 500px;
      transform-style: preserve-3d;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }
    
    @keyframes gridMove {
      0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
      100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
    }
    
    /* 故障文字效果 */
    .glitch {
      font-size: 48px;
      font-weight: 900;
      position: relative;
      text-transform: uppercase;
      letter-spacing: 4px;
      animation: glitch 2s infinite;
    }
    
    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    
    .glitch::before {
      left: 2px;
      text-shadow: -2px 0 #ff00ff;
      clip: rect(24px, 550px, 90px, 0);
      animation: glitch-1 2s infinite linear alternate-reverse;
    }
    
    .glitch::after {
      left: -2px;
      text-shadow: -2px 0 #00ffff;
      clip: rect(85px, 550px, 140px, 0);
      animation: glitch-2 2s infinite linear alternate-reverse;
    }
    
    @keyframes glitch {
      0%, 100% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(-2px, -2px); }
      60% { transform: translate(2px, 2px); }
      80% { transform: translate(2px, -2px); }
    }
    
    @keyframes glitch-1 {
      0% { clip: rect(20px, 9999px, 50px, 0); }
      20% { clip: rect(80px, 9999px, 120px, 0); }
      40% { clip: rect(10px, 9999px, 60px, 0); }
      60% { clip: rect(90px, 9999px, 130px, 0); }
      80% { clip: rect(40px, 9999px, 80px, 0); }
      100% { clip: rect(70px, 9999px, 110px, 0); }
    }
    
    @keyframes glitch-2 {
      0% { clip: rect(60px, 9999px, 100px, 0); }
      20% { clip: rect(10px, 9999px, 50px, 0); }
      40% { clip: rect(100px, 9999px, 140px, 0); }
      60% { clip: rect(30px, 9999px, 70px, 0); }
      80% { clip: rect(120px, 9999px, 160px, 0); }
      100% { clip: rect(50px, 9999px, 90px, 0); }
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 60px 20px;
      position: relative;
      z-index: 1;
    }
    
    .header {
      text-align: center;
      margin-bottom: 50px;
    }
    
    .subtitle {
      color: #ff00ff;
      font-size: 14px;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 8px;
    }
    
    /* 霓虹边框输入框 */
    .input-cyber {
      position: relative;
      margin-bottom: 30px;
    }
    
    .input-cyber input {
      width: 100%;
      padding: 20px 25px;
      background: rgba(0, 0, 0, 0.8);
      border: 2px solid #00ffff;
      border-radius: 0;
      color: #00ffff;
      font-family: 'Orbitron', monospace;
      font-size: 16px;
      outline: none;
      box-shadow: 
        0 0 10px rgba(0, 255, 255, 0.3),
        inset 0 0 20px rgba(0, 255, 255, 0.05);
      transition: all 0.3s;
    }
    
    .input-cyber input:focus {
      box-shadow: 
        0 0 30px rgba(0, 255, 255, 0.6),
        inset 0 0 20px rgba(0, 255, 255, 0.1);
      border-color: #ff00ff;
    }
    
    .input-cyber label {
      position: absolute;
      top: -12px;
      left: 20px;
      background: #0a0a0f;
      padding: 0 10px;
      color: #ff00ff;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    
    /* 霓虹按钮 */
    .btn-cyber {
      width: 100%;
      padding: 20px;
      background: transparent;
      border: 2px solid #ff00ff;
      color: #ff00ff;
      font-family: 'Orbitron', monospace;
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 4px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
    }
    
    .btn-cyber::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 0, 255, 0.4), transparent);
      transition: left 0.5s;
    }
    
    .btn-cyber:hover::before {
      left: 100%;
    }
    
    .btn-cyber:hover {
      background: rgba(255, 0, 255, 0.1);
      box-shadow: 
        0 0 30px rgba(255, 0, 255, 0.5),
        inset 0 0 30px rgba(255, 0, 255, 0.1);
      text-shadow: 0 0 10px #ff00ff;
    }
    
    /* 扫描线效果 */
    .scan-line {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: rgba(0, 255, 255, 0.5);
      box-shadow: 0 0 10px #00ffff;
      animation: scan 4s linear infinite;
      pointer-events: none;
      z-index: 1000;
    }
    
    @keyframes scan {
      0% { transform: translateY(-100vh); }
      100% { transform: translateY(100vh); }
    }
    
    .corner {
      position: fixed;
      width: 50px;
      height: 50px;
      border: 2px solid #00ffff;
      z-index: 100;
    }
    
    .corner-tl { top: 20px; left: 20px; border-right: 0; border-bottom: 0; }
    .corner-tr { top: 20px; right: 20px; border-left: 0; border-bottom: 0; }
    .corner-bl { bottom: 20px; left: 20px; border-right: 0; border-top: 0; }
    .corner-br { bottom: 20px; right: 20px; border-left: 0; border-top: 0; }
    
    .back-link {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #00ffff;
      text-decoration: none;
      font-size: 12px;
      z-index: 101;
      opacity: 0.7;
      transition: opacity 0.3s;
    }
    
    .back-link:hover {
      opacity: 1;
    }
  </style>
</head>
<body>
  <a href="../" class="back-link">← 返回选择界面</a>
  
  <div class="scan-line"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
  
  <div class="container">
    <div class="header">
      <h1 class="glitch" data-text="XMirror">XMirror</h1>
      <p class="subtitle">Cyberpunk Edition v2.0</p>
    </div>
    
    <div class="input-cyber">
      <label>X-Link Input</label>
      <input type="text" placeholder="https://x.com/username/status/...">
    </div>
    
    <button class="btn-cyber">Initialize Archive</button>
  </div>
</body>
</html>
