<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO 基础标签 -->
  <title>XMirror - X/Twitter 内容存档工具 | 永久保存推文、图片和视频</title>
  <meta name="description" content="XMirror 是一款专业的 X(Twitter) 内容存档工具，可永久保存推文、图片和视频，生成可访问的镜像页面。支持钉钉/微信卡片分享，防止内容丢失。">
  <meta name="keywords" content="X存档,Twitter存档,推文备份,内容镜像,X内容保存,Twitter备份工具,推文存档,社交媒体备份">
  <meta name="author" content="XMirror">
  <meta name="robots" content="index, follow">
  <meta name="googlebot" content="index, follow">
  
  <!-- Canonical URL -->
  <link rel="canonical" href="https://x.5666.net/">
  
  <!-- 主题色 -->
  <meta name="theme-color" content="#667eea">
  <meta name="msapplication-TileColor" content="#667eea">
  
  <!-- 性能优化 -->
  <link rel="preconnect" href="https://x.5666.net">
  <link rel="dns-prefetch" href="https://x.5666.net">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://x.5666.net/">
  <meta property="og:title" content="XMirror - X/Twitter 内容存档工具">
  <meta property="og:description" content="专业的 X(Twitter) 内容存档工具，永久保存推文、图片和视频，生成可访问的镜像页面。">
  <meta property="og:site_name" content="XMirror">
  <meta property="og:locale" content="zh_CN">
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://x.5666.net/">
  <meta name="twitter:title" content="XMirror - X/Twitter 内容存档工具">
  <meta name="twitter:description" content="专业的 X(Twitter) 内容存档工具，永久保存推文、图片和视频。">
  
  <!-- JSON-LD 结构化数据 -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "XMirror",
    "description": "专业的 X(Twitter) 内容存档工具，可永久保存推文、图片和视频，生成可访问的镜像页面。",
    "url": "https://x.5666.net/",
    "applicationCategory": "UtilitiesApplication",
    "operatingSystem": "Any",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "author": {
      "@type": "Organization",
      "name": "XMirror"
    }
  }
  </script>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <h1>🐦 XMirror</h1>
    <p class="subtitle">粘贴 X 链接，生成可访问的镜像页面</p>
    
    <div class="input-group">
      <label>X 链接</label>
      <input type="text" id="url" placeholder="https://x.com/username/status/1234567890" />
    </div>
    
    <button id="submit" onclick="archive()">生成镜像</button>
    
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>正在抓取内容...</p>
    </div>
    
    <div class="result" id="result"></div>
    
    <div class="history" id="history" style="display:none;">
      <h3>📚 最近存档</h3>
      <div id="historyList"></div>
    </div>
  </div>

  <!-- 删除确认弹窗 -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <h3>🗑️ 确认删除</h3>
      <p>确定要删除这篇存档吗？<br>此操作不可恢复。</p>
      <div class="modal-buttons">
        <button class="btn-cancel" onclick="closeDeleteModal()">取消</button>
        <button class="btn-delete" onclick="confirmDelete()">删除</button>
      </div>
    </div>
  </div>

  <script src="/i18n.js"></script>
  <script src="/app.js"></script>
</body>
</html>
